<svg viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg" width="900" height="190">
    <defs>
        <linearGradient id="bgAbout" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0D1117"/>
            <stop offset="100%" style="stop-color:#0F1923"/>
        </linearGradient>
        <linearGradient id="aboutHeaderLine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ED8B00;stop-opacity:0"/>
            <stop offset="20%" style="stop-color:#ED8B00"/>
            <stop offset="80%" style="stop-color:#ED8B00"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0"/>
        </linearGradient>
        <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ED8B00"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0.2"/>
        </linearGradient>
    </defs>

    <rect width="900" height="190" fill="url(#bgAbout)" rx="12"/>

    <text x="450" y="26" font-family="JetBrains Mono, monospace" font-size="11" fill="#ED8B00" text-anchor="middle" letter-spacing="4" font-weight="600">ABOUT ME</text>
    <rect x="200" y="31" width="500" height="1" fill="url(#aboutHeaderLine)"/>

    <rect x="60" y="62" width="3" height="110" rx="2" fill="url(#accentBar)"/>

    <text x="80" y="72" font-family="JetBrains Mono, monospace" font-size="12" fill="#F0F6FC" font-weight="600">Backend Java Developer</text>

    <text x="80" y="96" font-family="JetBrains Mono, monospace" font-size="12" fill="#9CA3AF">focused on building reliable, scalable and maintainable backend systems.</text>

    <text x="80" y="132" font-family="JetBrains Mono, monospace" font-size="12" fill="#9CA3AF">Currently working at <tspan fill="#ED8B00" font-weight="600">Lyreco Group</tspan><tspan fill="#9CA3AF"> while completing my Engineering Degree at </tspan><tspan fill="#ED8B00" font-weight="600">SUPINFO</tspan><tspan fill="#9CA3AF">.</tspan></text>

    <text x="80" y="168" font-family="JetBrains Mono, monospace" font-size="12" fill="#9CA3AF">I enjoy designing backend systems around Java, Spring Boot, Kafka, clean architecture, testing and observability.</text>
