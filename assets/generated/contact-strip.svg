<svg viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg" width="900" height="110">
    <defs>
        <linearGradient id="bgContact" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0D1117"/>
            <stop offset="100%" style="stop-color:#0F1923"/>
        </linearGradient>
        <linearGradient id="contactHeaderLine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ED8B00;stop-opacity:0"/>
            <stop offset="20%" style="stop-color:#ED8B00"/>
            <stop offset="80%" style="stop-color:#ED8B00"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0"/>
        </linearGradient>
        <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ED8B00;stop-opacity:0"/>
            <stop offset="50%" style="stop-color:#ED8B00;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0"/>
        </linearGradient>
    </defs>

    <rect width="900" height="110" fill="url(#bgContact)" rx="12"/>

    <text x="450" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#ED8B00" text-anchor="middle" letter-spacing="4" font-weight="600">CONNECT</text>
    <rect x="200" y="27" width="500" height="1" fill="url(#contactHeaderLine)"/>

    <a href="https://linkedin.com/in/mathis-dulieu">
        <g transform="translate(106, 40)">
            <rect x="0" y="0" width="160" height="44" rx="8" fill="#161B22" stroke="#0A66C2" stroke-width="1">
                <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
            </rect>
            <rect x="14" y="12" width="20" height="20" rx="4" fill="#0A66C2"/>
            <text x="24" y="26" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="900">in</text>
            <text x="48" y="19" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF">LinkedIn</text>
            <text x="48" y="32" font-family="JetBrains Mono, monospace" font-size="8" fill="#0A66C2" font-weight="600">mathis-dulieu</text>
        </g>
    </a>

    <a href="https://mathisdulieu.com">
        <g transform="translate(282, 40)">
            <rect x="0" y="0" width="160" height="44" rx="8" fill="#161B22" stroke="#ED8B00" stroke-width="1">
                <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3.4s" begin="0.3s" repeatCount="indefinite"/>
            </rect>
            <text x="24" y="28" font-family="Arial" font-size="18" fill="#ED8B00" text-anchor="middle">◈</text>
            <text x="48" y="19" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF">Portfolio</text>
            <text x="48" y="32" font-family="JetBrains Mono, monospace" font-size="8" fill="#ED8B00" font-weight="600">mathisdulieu.com</text>
        </g>
    </a>

    <a href="mailto:dulieu.mathis@gmail.com">
        <g transform="translate(458, 40)">
            <rect x="0" y="0" width="160" height="44" rx="8" fill="#161B22" stroke="#EA4335" stroke-width="1">
                <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
            </rect>
            <text x="24" y="28" font-family="Arial" font-size="16" fill="#EA4335" text-anchor="middle">✉</text>
            <text x="48" y="19" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF">Email</text>
            <text x="48" y="32" font-family="JetBrains Mono, monospace" font-size="8" fill="#EA4335" font-weight="600">dulieu.mathis@gmail.com</text>
        </g>
    </a>

    <a href="https://github.com/MathisDulieu">
        <g transform="translate(634, 40)">
            <rect x="0" y="0" width="160" height="44" rx="8" fill="#161B22" stroke="#F0F6FC" stroke-width="1">
                <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3.2s" begin="0.9s" repeatCount="indefinite"/>
            </rect>
            <text x="24" y="28" font-family="Arial" font-size="18" fill="#F0F6FC" text-anchor="middle">⬡</text>
            <text x="48" y="19" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF">GitHub</text>
            <text x="48" y="32" font-family="JetBrains Mono, monospace" font-size="8" fill="#F0F6FC" font-weight="600">MathisDulieu</text>
        </g>
    </a>

    <rect x="0" y="107" width="900" height="3" rx="3" fill="url(#footerGrad)"/>
</svg>