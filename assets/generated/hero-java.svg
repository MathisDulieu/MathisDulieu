<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" width="900" height="320">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0D1117"/>
            <stop offset="50%" style="stop-color:#0F1923"/>
            <stop offset="100%" style="stop-color:#0D1117"/>
        </linearGradient>
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ED8B00;stop-opacity:0"/>
            <stop offset="30%" style="stop-color:#ED8B00;stop-opacity:1"/>
            <stop offset="70%" style="stop-color:#F89820;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="svgBounds">
            <rect width="900" height="320"/>
        </clipPath>
    </defs>

    <rect width="900" height="320" fill="url(#bgGrad)" rx="12"/>

    <g opacity="0.06" clip-path="url(#svgBounds)">
        <line x1="0" y1="40" x2="900" y2="40" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="80" x2="900" y2="80" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="120" x2="900" y2="120" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="160" x2="900" y2="160" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="200" x2="900" y2="200" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="240" x2="900" y2="240" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="0" y1="280" x2="900" y2="280" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="100" y1="0" x2="100" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="200" y1="0" x2="200" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="300" y1="0" x2="300" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="400" y1="0" x2="400" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="500" y1="0" x2="500" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="600" y1="0" x2="600" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="700" y1="0" x2="700" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
        <line x1="800" y1="0" x2="800" y2="320" stroke="#ED8B00" stroke-width="0.5"/>
    </g>

    <g font-family="JetBrains Mono, Fira Code, monospace" font-size="11" clip-path="url(#svgBounds)">
        <text x="18" y="50" fill="#ED8B00" opacity="0.25">
            @SpringBootApplication
            <animate attributeName="opacity" values="0.25;0.5;0.25" dur="3.5s" repeatCount="indefinite"/>
        </text>
        <text x="18" y="70" fill="#00BFFF" opacity="0.18">
            public class JvmEngine {
            <animate attributeName="opacity" values="0.18;0.35;0.18" dur="4s" begin="0.5s" repeatCount="indefinite"/>
        </text>
        <text x="18" y="88" fill="#6DB33F" opacity="0.15">
            @KafkaListener(topics="events")
            <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" begin="1s" repeatCount="indefinite"/>
        </text>
        <text x="18" y="250" fill="#ED8B00" opacity="0.2">
            @Transactional
            <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
        </text>
        <text x="18" y="268" fill="#00BFFF" opacity="0.15">
            public void process(Event e) {
            <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>
        </text>
        <text x="18" y="286" fill="#9CA3AF" opacity="0.12">
            eventBus.publish(transform(e));
            <animate attributeName="opacity" values="0.12;0.25;0.12" dur="5.2s" begin="0.3s" repeatCount="indefinite"/>
        </text>
    </g>

    <g font-family="JetBrains Mono, Fira Code, monospace" font-size="11" clip-path="url(#svgBounds)">
        <text x="620" y="60" fill="#6DB33F" opacity="0.2">
            record KafkaEvent(String id,
            <animate attributeName="opacity" values="0.2;0.38;0.2" dur="4.2s" begin="0.6s" repeatCount="indefinite"/>
        </text>
        <text x="620" y="78" fill="#6DB33F" opacity="0.15">
            String type, Instant ts) {}
            <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3.6s" begin="1.1s" repeatCount="indefinite"/>
        </text>
        <text x="620" y="260" fill="#ED8B00" opacity="0.2">
            // TDD · Clean Architecture
            <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" begin="0.4s" repeatCount="indefinite"/>
        </text>
        <text x="620" y="278" fill="#00BFFF" opacity="0.15">
            // Observability · DDD
            <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4.8s" begin="0.9s" repeatCount="indefinite"/>
        </text>
    </g>

    <rect x="0" y="0" width="900" height="3" rx="3" fill="url(#lineGrad)"/>

    <rect x="0" y="317" width="900" height="3" rx="3" fill="url(#lineGrad)"/>

    <text x="450" y="148" font-family="JetBrains Mono, Fira Code, monospace" font-size="44" font-weight="700" fill="#F0F6FC" text-anchor="middle" filter="url(#glow)" letter-spacing="2">
        Mathis Dulieu
    </text>

    <rect x="150" y="158" width="600" height="2" rx="1" fill="url(#lineGrad)">
        <animate attributeName="width" values="0;600" dur="1.2s" fill="freeze"/>
    </rect>

    <text x="450" y="192" font-family="JetBrains Mono, Fira Code, monospace" font-size="16" fill="#ED8B00" text-anchor="middle" letter-spacing="3" font-weight="500">
        BACKEND JAVA DEVELOPER
    </text>

    <g opacity="0.4">
        <line x1="850" y1="10" x2="890" y2="10" stroke="#ED8B00" stroke-width="1"/>
        <line x1="890" y1="10" x2="890" y2="50" stroke="#ED8B00" stroke-width="1"/>
    </g>
    <g opacity="0.4">
        <line x1="10" y1="270" x2="10" y2="310" stroke="#ED8B00" stroke-width="1"/>
        <line x1="10" y1="310" x2="50" y2="310" stroke="#ED8B00" stroke-width="1"/>
    </g>
</svg>