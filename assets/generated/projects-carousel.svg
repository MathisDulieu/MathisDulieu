<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" width="900" height="260">
    <defs>
        <linearGradient id="bgProj" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0D1117"/>
            <stop offset="100%" style="stop-color:#0F1923"/>
        </linearGradient>
        <linearGradient id="cardBgP" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#161B22"/>
            <stop offset="100%" style="stop-color:#1A2233"/>
        </linearGradient>
        <linearGradient id="projHeaderLine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ED8B00;stop-opacity:0"/>
            <stop offset="20%" style="stop-color:#ED8B00"/>
            <stop offset="80%" style="stop-color:#ED8B00"/>
            <stop offset="100%" style="stop-color:#ED8B00;stop-opacity:0"/>
        </linearGradient>
        <style>
            .slide { animation: carousel 15s infinite; }
            @keyframes carousel {
            0%, 28%   { opacity: 1; transform: translateY(0); }
            33%, 61%  { opacity: 0; transform: translateY(-8px); }
            66%, 94%  { opacity: 0; transform: translateY(-8px); }
            99%, 100% { opacity: 1; transform: translateY(0); }
            }
            .slide2 { animation: carousel2 15s infinite; }
            @keyframes carousel2 {
            0%, 28%   { opacity: 0; transform: translateY(8px); }
            33%, 61%  { opacity: 1; transform: translateY(0); }
            66%, 94%  { opacity: 0; transform: translateY(-8px); }
            99%, 100% { opacity: 0; transform: translateY(8px); }
            }
            .slide3 { animation: carousel3 15s infinite; }
            @keyframes carousel3 {
            0%, 28%   { opacity: 0; transform: translateY(8px); }
            33%, 61%  { opacity: 0; transform: translateY(8px); }
            66%, 94%  { opacity: 1; transform: translateY(0); }
            99%, 100% { opacity: 0; transform: translateY(8px); }
            }
            .dot1 { animation: dot1anim 15s infinite; }
            @keyframes dot1anim {
            0%, 33%  { fill: #ED8B00; r: 5; }
            34%, 100%{ fill: #374151; r: 4; }
            }
            .dot2 { animation: dot2anim 15s infinite; }
            @keyframes dot2anim {
            0%, 32%  { fill: #374151; r: 4; }
            33%, 65% { fill: #ED8B00; r: 5; }
            66%, 100%{ fill: #374151; r: 4; }
            }
            .dot3 { animation: dot3anim 15s infinite; }
            @keyframes dot3anim {
            0%, 64%  { fill: #374151; r: 4; }
            65%, 97% { fill: #ED8B00; r: 5; }
            98%, 100%{ fill: #374151; r: 4; }
            }
            .counter { animation: counter1 15s infinite; }
            @keyframes counter1 {
            0%, 32%  { opacity: 1; }
            33%, 100%{ opacity: 0; }
            }
            .counter2 { animation: counter2anim 15s infinite; }
            @keyframes counter2anim {
            0%, 32%  { opacity: 0; }
            33%, 65% { opacity: 1; }
            66%, 100%{ opacity: 0; }
            }
            .counter3 { animation: counter3anim 15s infinite; }
            @keyframes counter3anim {
            0%, 64%  { opacity: 0; }
            65%, 97% { opacity: 1; }
            98%, 100%{ opacity: 0; }
            }
        </style>
    </defs>

    <rect width="900" height="260" fill="url(#bgProj)" rx="12"/>

    <text x="450" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#ED8B00" text-anchor="middle" letter-spacing="4" font-weight="600">FEATURED PROJECTS</text>
    <rect x="200" y="33" width="500" height="1" fill="url(#projHeaderLine)"/>

    <rect x="60" y="48" width="780" height="185" rx="10" fill="url(#cardBgP)" stroke="#ED8B00" stroke-width="1" opacity="0.8"/>

    <g opacity="0.4">
        <polygon points="30,140 48,125 48,155" fill="#ED8B00"/>
    </g>
    <g opacity="0.4">
        <polygon points="870,140 852,125 852,155" fill="#ED8B00"/>
    </g>

    <circle cx="435" cy="245" r="4" class="dot1"/>
    <circle cx="450" cy="245" r="4" class="dot2"/>
    <circle cx="465" cy="245" r="4" class="dot3"/>

    <g class="slide">
        <text x="450" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle" class="counter">1 / 3</text>

        <text x="450" y="94" font-family="JetBrains Mono, monospace" font-size="18" fill="#F0F6FC" text-anchor="middle" font-weight="700">Realtime Ticketing Platform</text>
        <rect x="200" y="100" width="500" height="1" fill="#ED8B00" opacity="0.2"/>

        <text x="450" y="124" font-family="JetBrains Mono, monospace" font-size="11" fill="#9CA3AF" text-anchor="middle">Distributed ticketing platform inspired by Ticketmaster and Eventbrite.</text>

        <g transform="translate(195, 138)">
            <rect x="0" y="0" width="62" height="18" rx="3" fill="#ED8B00" opacity="0.15"/>
            <text x="31" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#ED8B00" text-anchor="middle">Java 21</text>

            <rect x="68" y="0" width="76" height="18" rx="3" fill="#6DB33F" opacity="0.15"/>
            <text x="106" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#6DB33F" text-anchor="middle">Spring Boot</text>

            <rect x="150" y="0" width="52" height="18" rx="3" fill="#9CA3AF" opacity="0.15"/>
            <text x="176" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">Kafka</text>

            <rect x="208" y="0" width="64" height="18" rx="3" fill="#47A248" opacity="0.15"/>
            <text x="240" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#47A248" text-anchor="middle">MongoDB</text>

            <rect x="278" y="0" width="54" height="18" rx="3" fill="#2496ED" opacity="0.15"/>
            <text x="305" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#2496ED" text-anchor="middle">Docker</text>

            <rect x="338" y="0" width="66" height="18" rx="3" fill="#F46800" opacity="0.15"/>
            <text x="371" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#F46800" text-anchor="middle">Grafana</text>

            <rect x="410" y="0" width="100" height="18" rx="3" fill="#E6522C" opacity="0.15"/>
            <text x="460" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#E6522C" text-anchor="middle">Prometheus</text>
        </g>

        <text x="450" y="184" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Event-driven · Microservices · WebSocket · SSE · Observability</text>
        <text x="450" y="200" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Real-time availability updates at scale</text>
    </g>

    <g class="slide2">
        <text x="450" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle" class="counter2">2 / 3</text>
        <text x="450" y="94" font-family="JetBrains Mono, monospace" font-size="18" fill="#F0F6FC" text-anchor="middle" font-weight="700">Data Processing Platform</text>
        <rect x="200" y="100" width="500" height="1" fill="#ED8B00" opacity="0.2"/>
        <text x="450" y="124" font-family="JetBrains Mono, monospace" font-size="11" fill="#9CA3AF" text-anchor="middle">Enterprise-oriented platform for data ingestion, validation and analytics.</text>

        <g transform="translate(263, 138)">
            <rect x="0" y="0" width="62" height="18" rx="3" fill="#ED8B00" opacity="0.15"/>
            <text x="31" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#ED8B00" text-anchor="middle">Java 21</text>

            <rect x="68" y="0" width="76" height="18" rx="3" fill="#6DB33F" opacity="0.15"/>
            <text x="106" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#6DB33F" text-anchor="middle">Spring Boot</text>

            <rect x="150" y="0" width="76" height="18" rx="3" fill="#4169E1" opacity="0.15"/>
            <text x="188" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#4169E1" text-anchor="middle">PostgreSQL</text>

            <rect x="232" y="0" width="66" height="18" rx="3" fill="#1F2937" opacity="0.8"/>
            <text x="265" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">REST API</text>

            <rect x="304" y="0" width="70" height="18" rx="3" fill="#ED8B00" opacity="0.15"/>
            <text x="339" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#ED8B00" text-anchor="middle">Dashboard</text>
        </g>

        <text x="450" y="184" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Batch processing · CSV/JSON ingestion · Data validation · Reporting</text>
        <text x="450" y="200" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Analytics-oriented dashboards with enterprise-grade data pipelines</text>
    </g>

    <g class="slide3">
        <text x="450" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle" class="counter3">3 / 3</text>
        <text x="450" y="94" font-family="JetBrains Mono, monospace" font-size="18" fill="#F0F6FC" text-anchor="middle" font-weight="700">CppRoyale</text>
        <rect x="200" y="100" width="500" height="1" fill="#ED8B00" opacity="0.2"/>
        <text x="450" y="124" font-family="JetBrains Mono, monospace" font-size="11" fill="#9CA3AF" text-anchor="middle">Multiplayer real-time strategy game built on a client-server architecture.</text>

        <g transform="translate(274, 138)">
            <rect x="0" y="0" width="58" height="18" rx="3" fill="#00599C" opacity="0.15"/>
            <text x="29" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#00599C" text-anchor="middle">C++17</text>

            <rect x="64" y="0" width="48" height="18" rx="3" fill="#8CC445" opacity="0.15"/>
            <text x="88" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#8CC445" text-anchor="middle">SFML</text>

            <rect x="118" y="0" width="78" height="18" rx="3" fill="#1F2937" opacity="0.8"/>
            <text x="157" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">Networking</text>

            <rect x="202" y="0" width="70" height="18" rx="3" fill="#ED8B00" opacity="0.15"/>
            <text x="237" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#ED8B00" text-anchor="middle">Game Loop</text>

            <rect x="278" y="0" width="74" height="18" rx="3" fill="#2563EB" opacity="0.15"/>
            <text x="315" y="12" font-family="JetBrains Mono, monospace" font-size="9" fill="#2563EB" text-anchor="middle">Pathfinding</text>
        </g>

        <text x="450" y="184" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Client-server · Custom protocol · Fixed tick game loop · Real-time multiplayer</text>
        <text x="450" y="200" font-family="JetBrains Mono, monospace" font-size="10" fill="#6B7280" text-anchor="middle">Low-latency networking with deterministic game simulation</text>
    </g>
</svg>